<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./images/Logo Round PNG.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <div class="box-pages">
                <img class="title-logo-pages" src="./images/Logo Round PNG.png" alt="little home bakery">
            </div>
        </header>
        <main>
            <div class="nav-pages">
                <nav>
                    <ul class="nav__list">
                        <li class="nav__item"><a class="nav__link" href="./index.html">Home</a></li>
                        <li class="nav__item"><a class="nav__link" href="./menu.html" target="_blank">Menu</a></li>
                        <li class="nav__item"><a class="nav__link" href="./about-us.html" target="_blank">About us</a>
                        </li>
                        <li class="nav__item"><a class="nav__link" href="./gallery.html" target="_blank">Gallery</a>
                        </li>
                        <li class="nav__item"><a class="nav__link" href="./contact-us.html" target="_blank">Contact
                                us</a></li>
                    </ul>
                </nav>
            </div>
            <h1 class="contact-us-title">General Inquiry</h1>
            <div id="general-inquiry">
                <div class="general-inquiry-container">
                    <form class="form" action="kot-yuliya@mail.ru" method="post">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" name="first name">
                        <br>
                        <label for="number">Contact Number</label>
                        <input type="text" id="number" name="number">
                        <br>
                        <label for="email">Email</label>
                        <input type="text" id="email" name="email">
                        <br>
                        <label for="inquiry">Inquiry</label>
                        <textarea type="text" id="inquiry" name="inquiry" style="height:200px"></textarea>
                        <br>
                        <input type="submit" value="Submit">
                    </form>
                </div>
            </div>
        </main>
        <footer class="footer">
            <h2 class="contact-info">Contact info</h2>
            <ul class="contact-info-list">
                <li class="contact-info-item"><img class="email-icon" src="./images/email-icon.png" alt="email">
                    <a class="email-link"
                        href="mailto:littlehomebakery2023@gmail.com">littlehomebakery2023@gmail.com</a>
                </li>
                <li class="contact-info-item"><img class="location-icon" src="./images/location-icon.png"
                        alt="location-icon">
                    Miami, USA</li>
            </ul>
            <p class="rights">&copy; Little Home Bakery. All Rights Reserved.
            </p>
        </footer>
    </div>
</body>

</html>
